<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selection Protocol</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
color:#eee;
font-family:"Courier New", monospace;
overflow:hidden;
}

/* BACKGROUND */
canvas{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:0;
}

/* VHS EFFECT */
.overlay{
position:fixed;
top:0;left:0;width:100%;height:100%;
pointer-events:none;
}

.scanlines{
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 1px,
transparent 2px,
transparent 4px
);
opacity:.2;
animation:scan 8s linear infinite;
}

.noise{
background-image:radial-gradient(circle,rgba(255,255,255,.7) .7px,transparent 1px);
background-size:4px 4px;
opacity:.05;
animation:noise .15s infinite;
}

/* MAIN */
.frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:900px;
padding:40px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.8);
text-align:center;
box-shadow:0 0 50px rgba(255,0,0,.2);
}

/* TEXT */
.title{
font-size:clamp(32px,6vw,70px);
letter-spacing:.1em;
margin-bottom:20px;
text-transform:uppercase;
}

.subtitle{
opacity:.7;
margin-bottom:20px;
}

.type{
white-space:pre-wrap;
font-size:18px;
min-height:200px;
}

.cursor{
animation:blink 1s infinite;
}

/* BUTTON */
.btn{
margin-top:30px;
padding:12px 20px;
border:1px solid rgba(255,255,255,.2);
cursor:pointer;
font-size:12px;
letter-spacing:.2em;
background:none;
color:white;
}

/* GLITCH */
.glitch{
position:relative;
}

.glitch::before,
.glitch::after{
content:attr(data-text);
position:absolute;
top:0;left:0;
width:100%;
opacity:.6;
}

.glitch::before{color:red;transform:translate(2px,-2px)}
.glitch::after{color:cyan;transform:translate(-2px,2px)}

/* FLASH */
.flash{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:#fff;
opacity:0;
z-index:10;
}

/* SHADOW ENTITY */
.entity{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:radial-gradient(circle at center,transparent 20%,rgba(0,0,0,.95));
opacity:0;
z-index:9;
}

/* ANIMATIONS */
@keyframes blink{50%{opacity:0}}
@keyframes scan{0%{transform:translateY(-2%)}100%{transform:translateY(2%)}}
@keyframes noise{0%{transform:translate(0,0)}100%{transform:translate(1%,1%)}}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="overlay scanlines"></div>
<div class="overlay noise"></div>

<div class="entity" id="entity"></div>
<div class="flash" id="flash"></div>

<div class="frame">

<div class="title glitch" data-text="SELECTION PROTOCOL ACTIVE">
SELECTION PROTOCOL ACTIVE
</div>

<div class="type" id="type"></div>

<button class="btn" id="start">BEGIN</button>

</div>

<script>
/* =====================
EDIT THIS FOR EACH PERSON
===================== */
const INVITE = {
name: "Sam Newman",
role: "Groomsman",
message:
"You were never one of the random ones.\n\nThrough everything — the chaos, the nights, the memories — you were always part of it.\n\nI don't want anyone else standing there.\n\nI want you."
};

/* =====================
TYPE EFFECT
===================== */
const typeBox = document.getElementById("type");

function typeText(lines, callback){
let text = lines.join("\n");
let i=0;

function step(){
let display = text.substring(0,i);

// corruption effect
if(Math.random()>.97){
display = display.replace(/./g,c=>Math.random()>.98?"#":c);
}

typeBox.innerHTML = display + '<span class="cursor">|</span>';
i++;

if(i<=text.length){
setTimeout(step, Math.random()*40+25);
}else{
setTimeout(callback,800);
}
}
step();
}

/* =====================
GLITCH + ENTITY
===================== */
function scare(){
const entity = document.getElementById("entity");
const flash = document.getElementById("flash");

entity.style.opacity = .9;
flash.style.opacity = .8;

setTimeout(()=>{
entity.style.opacity=0;
flash.style.opacity=0;
},120);
}

setInterval(()=>{
if(Math.random()>.92){
scare();
}
},2000);

/* =====================
AUDIO
===================== */
let ctx;

function startAudio(){
ctx = new (window.AudioContext||window.webkitAudioContext)();

// low rumble
const osc = ctx.createOscillator();
osc.frequency.value = 35;

const gain = ctx.createGain();
gain.gain.value = .05;

osc.connect(gain).connect(ctx.destination);
osc.start();

// glitch bursts
setInterval(()=>{
const burst = ctx.createOscillator();
burst.type="square";
burst.frequency.value = 700 + Math.random()*800;

const g = ctx.createGain();
g.gain.setValueAtTime(0.0001,ctx.currentTime);
g.gain.linearRampToValueAtTime(.05,ctx.currentTime+.01);
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+.2);

burst.connect(g).connect(ctx.destination);
burst.start();
burst.stop(ctx.currentTime+.2);
},1600);
}

/* =====================
FLOW
===================== */
document.getElementById("start").onclick=()=>{
startAudio();

typeText([
"Initializing selection...",
"Scanning...",
"Subjects removed...",
"...",
"...",
"Only one remains."
], ()=>{

scare();

setTimeout(()=>{
typeText([
"IDENTITY FOUND:",
"",
INVITE.name.toUpperCase()
], ()=>{

setTimeout(()=>{
typeText([
"",
"ROLE:",
INVITE.role.toUpperCase()
], ()=>{

setTimeout(()=>{
typeText([
"",
INVITE.message,
"",
"",
"Will you stand beside me?"
], ()=>{

document.getElementById("type").innerHTML +=
"\n\n>>> ACCEPT <<<";

});
},800);
});
},800);
});
},500);
});
};

/* =====================
BACKGROUND
===================== */
const canvas = document.getElementById("bg");
const c = canvas.getContext("2d");

let w,h;
function resize(){
w=canvas.width=innerWidth;
h=canvas.height=innerHeight;
}
resize();
window.onresize=resize;

let stars = Array.from({length:120},()=>({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*1.5
}));

function draw(){
c.fillStyle="#000";
c.fillRect(0,0,w,h);

for(let s of stars){
c.fillStyle="rgba(255,255,255,.5)";
c.fillRect(s.x,s.y,s.r,s.r);
}

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
